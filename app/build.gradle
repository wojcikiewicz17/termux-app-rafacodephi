def resolveApkFromMetadata = { String buildType ->
    def metadataFile = file("${buildDir}/outputs/apk/${buildType}/output-metadata.json")
    if (!metadataFile.exists()) {
        throw new GradleException("APK metadata not found for ${buildType}: ${metadataFile}")
    }

    def metadata = new JsonSlurper().parse(metadataFile)
    def elements = metadata?.elements ?: []
    if (elements.isEmpty()) {
        throw new GradleException("No APK outputs registered in ${metadataFile}")
    }

    def preferred = elements.find { element ->
        def filters = element.filters ?: []
        filters.isEmpty() || filters.any { filter -> filter.filterType == 'ABI' && filter.value == 'universal' }
    } ?: elements[0]

    def outputFileName = preferred.outputFile
    if (!outputFileName) {
        throw new GradleException("Invalid output metadata entry in ${metadataFile}: ${preferred}")
    }

    def apkFile = file("${buildDir}/outputs/apk/${buildType}/${outputFileName}")
    if (!apkFile.exists()) {
        throw new GradleException("Expected APK does not exist: ${apkFile}")
    }

    return apkFile
}

def register16kbValidationTask = { String buildType ->
    def capitalized = buildType.capitalize()
    tasks.register("validateAndroid15Compatibility${capitalized}", Exec) {
        description = "Validate Android 15 16KB LOAD alignment for ${buildType} APK"
        group = 'verification'
        dependsOn("assemble${capitalized}")
        doFirst {
            def apkFile = resolveApkFromMetadata(buildType)
            println "Validating APK ${apkFile}"
            commandLine "bash",
                    "${rootProject.projectDir}/scripts/validate_16kb_pages.sh",
                    "--apk", apkFile.absolutePath,
                    "--require-readelf",
                    "--abis", "arm64-v8a,x86_64"
        }
    }
}

