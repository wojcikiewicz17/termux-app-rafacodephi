tasks.register("validateVectraGradeBenchContract") {
    group = "verification"
    description = "Validates Vectra contract artifacts when RAF_ENABLE_VECTRA_BENCH=true."
    doLast {
        def enabled = (System.getenv("RAF_ENABLE_VECTRA_BENCH") ?: "false").toBoolean()
        if (!enabled) {
            logger.lifecycle("RAF_ENABLE_VECTRA_BENCH=false; skipping Vectra artifact validation.")
            return
        }
        def reportJson = file("${rootDir}/reports/vectra_integration_report.json")
        def reportMd = file("${rootDir}/reports/vectra_integration_report.md")
        if (!reportJson.exists() || !reportMd.exists()) {
            throw new GradleException("Vectra benchmark contract enabled but required reports are missing.")
        }
    }
}

def rafEnvTrue = { String name, boolean defVal=false ->
    def v = System.getenv(name)
    return v == null ? defVal : v.equalsIgnoreCase('true')
}

