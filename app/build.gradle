def ensureBootstrapInfoEntry(File file, String expectedPackageName, String expectedPageSize) {
    def zipFile = new java.util.zip.ZipFile(file)
    try {
        if (zipFile.getEntry("BOOTSTRAP_INFO") != null) return
    } finally {
        zipFile.close()
    }

    File tmpFile = new File(file.parentFile, file.name + ".tmp")
    if (tmpFile.exists()) tmpFile.delete()
    def infoText = "TERMUX_PACKAGE_NAME=${expectedPackageName}\nTERMUX_PAGE_SIZE=${expectedPageSize}\n"

    zipFile = new java.util.zip.ZipFile(file)
    def zipOut = new java.util.zip.ZipOutputStream(new FileOutputStream(tmpFile))
    try {
        def entries = zipFile.entries()
        while (entries.hasMoreElements()) {
            def oldEntry = entries.nextElement()
            def newEntry = new java.util.zip.ZipEntry(oldEntry.name)
            newEntry.time = oldEntry.time

            if (oldEntry.method == java.util.zip.ZipEntry.STORED) {
                newEntry.method = java.util.zip.ZipEntry.STORED
                newEntry.size = oldEntry.size
                newEntry.compressedSize = oldEntry.compressedSize
                newEntry.crc = oldEntry.crc
            }

            zipOut.putNextEntry(newEntry)
            zipOut << zipFile.getInputStream(oldEntry)
            zipOut.closeEntry()
        }

        def infoEntry = new java.util.zip.ZipEntry("BOOTSTRAP_INFO")
        infoEntry.time = 0L
        zipOut.putNextEntry(infoEntry)
        zipOut.write(infoText.getBytes("UTF-8"))
        zipOut.closeEntry()
    } finally {
        zipOut.close()
        zipFile.close()
    }

    if (!tmpFile.renameTo(file)) {
        tmpFile.delete()
        throw new GradleException("Failed to finalize BOOTSTRAP_INFO injection for " + file.name)
    }

    logger.lifecycle("Injected BOOTSTRAP_INFO into ${file.name} using pinned bootstrap metadata.")
}

def hasReleaseTaskRequested() {
    return gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }
}

def hasDebugTaskRequested() {
    return gradle.startParameter.taskNames.any { it.toLowerCase().contains("debug") }
}

def resolveBootstrapValidationMode(String configuredMode) {
    if (configuredMode == "auto") {
        if (hasReleaseTaskRequested()) return "strict"
        if (hasDebugTaskRequested()) return "upstream-debug-compat"
        return "upstream-debug-compat"
    }
    if (configuredMode != "strict" && configuredMode != "upstream-debug-compat") {
        throw new GradleException(
            "Unsupported TERMUX_BOOTSTRAP_VALIDATION_MODE \"" + configuredMode +
            "\". Allowed values: auto, strict, upstream-debug-compat."
        )
    }
    return configuredMode
}

tasks.register("downloadBootstraps") {
    doLast {
        def packageVariant = project.ext.packageVariant
        def expectedBootstrapPackageName = project.ext.bootstrapMetadataPackageName
        def expectedPageSize = project.ext.bootstrapRequiredPageSize
        def bootstrapValidationMode = resolveBootstrapValidationMode(project.ext.bootstrapValidationMode)

        if (bootstrapValidationMode == "upstream-debug-compat" &&
            gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }) {
            throw new GradleException("TERMUX_BOOTSTRAP_VALIDATION_MODE=upstream-debug-compat is forbidden for release tasks.")
        }

        def validateBootstrap = { arch, checksum, version ->
            downloadBootstrap(arch, checksum, version)
            File file = new File(projectDir, "src/main/cpp/bootstrap-${arch}.zip")
            requiredBootstrapMetadata(file, expectedBootstrapPackageName, expectedPageSize, bootstrapValidationMode)
        }

        if (packageVariant == "apt-android-7") {
            def version = "2022.04.28-r5" + "+" + packageVariant
            validateBootstrap("aarch64", "4a51a7eb209fe82efc24d52e3cccc13165f27377290687cb82038cbd8e948430", version)
            validateBootstrap("arm", "6459a786acbae50d4c8a36fa1c3de6a4dd2d482572f6d54f73274709bd627325", version)
            validateBootstrap("i686", "919d212b2f19e08600938db4079e794e947365022dbfd50ac342c50fcedcd7be", version)
            validateBootstrap("x86_64", "61b02fdc03ea4f5d9da8d8cf018013fdc6659e6da6cbf44e9b24d1c623580b89", version)
        } else if (packageVariant == "apt-android-5") {
            def version = "2022.04.28-r6" + "+" + packageVariant
            validateBootstrap("aarch64", "913609d439415c828c5640be1b0561467e539cb1c7080662decaaca2fb4820e7", version)
            validateBootstrap("arm", "26bfb45304c946170db69108e5eb6e3641aad751406ce106c80df80cad2eccf8", version)
            validateBootstrap("i686", "46dcfeb5eef67ba765498db9fe4c50dc4690805139aa0dd141a9d8ee0693cd27", version)
            validateBootstrap("x86_64", "615b590679ee6cd885b7fd2ff9473c845e920f9b422f790bb158c63fe42b8481", version)
        } else {
            throw new GradleException("Unsupported TERMUX_PACKAGE_VARIANT \"" + packageVariant + "\"")
        }
    }
}



tasks.register("rewriteBootstraps") {
    group = "build setup"
    description = "Rewrites upstream bootstraps into runtime-ready RAFCODEPHI bootstraps."
    dependsOn(tasks.named("downloadBootstraps"))
    doLast {
        def mappings = [
            [arch:"arm", abi:"armeabi-v7a"],
            [arch:"aarch64", abi:"arm64-v8a"],
            [arch:"i686", abi:"x86"],
            [arch:"x86_64", abi:"x86_64"]
        ]
        mappings.each { m ->
            exec {
                workingDir rootProject.projectDir
                commandLine "python3", "scripts/rewrite_bootstrap.py",
                    "--input", "app/src/main/cpp/bootstrap-${m.arch}.zip",
                    "--output", "app/src/main/cpp/rewritten-bootstrap-${m.arch}.zip",
                    "--arch", m.arch,
                    "--abi", m.abi,
                    "--package-name", project.ext.bootstrapMetadataPackageName,
                    "--prefix", "/data/data/${project.ext.bootstrapMetadataPackageName}/files/usr",
                    "--home", "/data/data/${project.ext.bootstrapMetadataPackageName}/files/home",
                    "--page-size", project.ext.bootstrapRequiredPageSize,
                    "--variant", project.ext.packageVariant
            }
        }
    }
}

tasks.register("validateRewrittenBootstraps") {
    group = "verification"
    description = "Validates rewritten bootstrap metadata and runtime readiness contract."
    dependsOn(tasks.named("rewriteBootstraps"))
    doLast {
        ["arm","aarch64","i686","x86_64"].each { arch ->
            def f = new File(projectDir, "src/main/cpp/rewritten-bootstrap-${arch}.zip")
            if (!f.exists()) throw new GradleException("Missing rewritten bootstrap: ${f}")
            def z = new java.util.zip.ZipFile(f)
            try {
                def info = z.getInputStream(z.getEntry("BOOTSTRAP_INFO")).getText("UTF-8")
                if (!info.contains("BOOTSTRAP_RUNTIME_READY=1")) throw new GradleException("BOOTSTRAP_RUNTIME_READY invalid for ${arch}")
                if (!info.contains("BOOTSTRAP_KIND=rewritten")) throw new GradleException("BOOTSTRAP_KIND invalid for ${arch}")
                if (z.getEntry("BUILD_ONLY") != null) {
                    def v = z.getInputStream(z.getEntry("BUILD_ONLY")).getText("UTF-8").trim()
                    if (v == "1") throw new GradleException("BUILD_ONLY=1 on ${arch}")
                }
                if (z.getEntry("bin/sh") == null) throw new GradleException("bin/sh missing on ${arch}")
                if (z.getEntry("bin/pkg") == null) throw new GradleException("bin/pkg missing on ${arch}")
            } finally { z.close() }
        }
    }
}

tasks.register("buildDeveloperBootstraps", Exec) {
    description = 'Compiles RAFCODEΦ local bootstrap zip artifacts for CI/developer builds.'
    group = 'build setup'
    workingDir rootProject.projectDir
    commandLine "bash", "scripts/build_rafaelia_bootstraps.sh"
}



task verifyBootstrapZipsPresent {
    dependsOn(tasks.named("downloadBootstraps"))
    description = 'Verifies required bootstrap zip artifacts are present in src/main/cpp.'
    group = 'verification'

    doLast {
        def requiredZips = [
            'src/main/cpp/bootstrap-aarch64.zip',
            'src/main/cpp/bootstrap-arm.zip',
            'src/main/cpp/bootstrap-i686.zip',
            'src/main/cpp/bootstrap-x86_64.zip'
        ]

        def missing = requiredZips.findAll { !new File(projectDir, it).exists() }
        if (!missing.isEmpty()) {
            throw new GradleException('Missing required bootstrap zip artifacts:\n - ' + missing.join('\n - ') +
                '\nRun :app:ensureBootstrapArchives to compile or download them before native build tasks.')
        }

        requiredZips.each { path ->
            requiredBootstrapMetadata(new File(projectDir, path), project.ext.bootstrapMetadataPackageName, project.ext.bootstrapRequiredPageSize, "strict")
        }

    }
}



tasks.register("validateBootstrapBlake3Config") {
    description = "Validates TERMUX_BOOTSTRAP_BLAKE3_* availability before packaging."
    group = "verification"
    doLast {
        def missing = []
        def values = [
            "AARCH64": project.ext.bootstrapBlake3Aarch64,
            "ARM": project.ext.bootstrapBlake3Arm,
            "I686": project.ext.bootstrapBlake3I686,
            "X86_64": project.ext.bootstrapBlake3X8664
        ]
        values.each { arch, value ->
            if (!value || value.trim().isEmpty()) missing << arch
        }

        if (!missing.isEmpty()) {
            def msg = "Missing TERMUX_BOOTSTRAP_BLAKE3_* for architectures: ${missing.join(', ')}. " +
                "Set TERMUX_BOOTSTRAP_BLAKE3_AARCH64/ARM/I686/X86_64 before release builds."
            if (hasReleaseTaskRequested()) {
                throw new GradleException(msg)
            }
            logger.warn(msg + " Debug builds are allowed but are not BOOTSTRAP_RUNTIME_READY.")
        }
    }
}
tasks.register("ensureBootstrapArchives") {
    description = 'Compiles/downloads and validates all bootstrap zip artifacts required by native bootstrap ASM embedding.'
    group = 'build setup'
    def useDevBootstrap = (project.findProperty("RAF_BOOTSTRAP_SOURCE") ?: System.getenv("RAF_BOOTSTRAP_SOURCE") ?: "").toString().toLowerCase() == "local"
    dependsOn(useDevBootstrap ? tasks.named("buildDeveloperBootstraps") : tasks.named("validateRewrittenBootstraps"))
    dependsOn(tasks.named("validateBootstrapBlake3Config"))
}
def requiredBootstrapMetadata(File file, String expectedPackageName, String expectedPageSize, String validationMode) {
    def zipFile = new java.util.zip.ZipFile(file)
    try {
        def entry = zipFile.getEntry("BOOTSTRAP_INFO")
        if (entry == null) {
            if (validationMode == "upstream-debug-compat") {
                zipFile.close()
                zipFile = null
                ensureBootstrapInfoEntry(file, expectedPackageName, expectedPageSize)
                zipFile = new java.util.zip.ZipFile(file)
                entry = zipFile.getEntry("BOOTSTRAP_INFO")
            }
            if (entry == null) {
                throw new GradleException("Missing BOOTSTRAP_INFO in " + file.name +
                    ". Build a bootstrap that records TERMUX_PACKAGE_NAME and TERMUX_PAGE_SIZE.")
            }
        }

        def text = zipFile.getInputStream(entry).getText("UTF-8")
        def metadata = [:]
        text.eachLine { line ->
            def trimmed = line.trim()
            if (!trimmed || trimmed.startsWith("#") || !trimmed.contains("=")) return
            def parts = trimmed.split("=", 2)
            metadata[parts[0].trim()] = parts[1].trim()
        }

        def packageName = metadata["TERMUX_PACKAGE_NAME"]
        if (packageName != expectedPackageName) {
            if (validationMode == "upstream-debug-compat" && packageName == "com.termux") {
                logger.warn("BOOTSTRAP_INFO package com.termux in ${file.name}; allowed by TERMUX_BOOTSTRAP_VALIDATION_MODE=upstream-debug-compat")
            } else {
                throw new GradleException("BOOTSTRAP_INFO TERMUX_PACKAGE_NAME mismatch in " + file.name +
                    ": expected \"" + expectedPackageName + "\", got \"" + packageName + "\"")
            }
        }

        def pageSize = metadata["TERMUX_PAGE_SIZE"]
        if (pageSize != expectedPageSize) {
            if (validationMode == "upstream-debug-compat") {
                logger.warn("BOOTSTRAP_INFO page size mismatch in ${file.name}; expected ${expectedPageSize}, got ${pageSize}, allowed by TERMUX_BOOTSTRAP_VALIDATION_MODE=upstream-debug-compat")
            } else {
                throw new GradleException("BOOTSTRAP_INFO TERMUX_PAGE_SIZE mismatch in " + file.name +
                    ": expected \"" + expectedPageSize + "\", got \"" + pageSize + "\"")
            }
        }
    } finally {
        zipFile.close()
    }
}

afterEvaluate {
    android.applicationVariants.all { variant ->
        variant.preBuildProvider.get().dependsOn(ensureBootstrapArchives)
        variant.preBuildProvider.get().dependsOn(tasks.named("validateRewrittenBootstraps"))
        variant.javaCompileProvider.get().dependsOn(ensureBootstrapArchives)
    }

    def shouldWireBootstrapDeps = { task ->
        task.name.startsWith("externalNativeBuild") || task.name.startsWith("configureNdkBuild")
    }

    tasks.matching(shouldWireBootstrapDeps).configureEach {
        dependsOn(ensureBootstrapArchives)
        dependsOn(tasks.named("validateRewrittenBootstraps"))
    }

    tasks.whenTaskAdded { task ->
        if (shouldWireBootstrapDeps(task)) {
            task.dependsOn(ensureBootstrapArchives)
            task.dependsOn(tasks.named("validateRewrittenBootstraps"))
        }
    }
}

// Validation task to check for hardcoded package names
task validatePackageNames {
    description = 'Validates that no hardcoded com.termux package names exist (except in package/import declarations)'
    group = 'verification'
    
    doLast {
        def errors = []
        def rootDir = project.rootProject.projectDir
        
        // Files to check
        fileTree(rootDir) {
            include '**/*.java', '**/*.kt', '**/*.xml'
            exclude '**/build/**', '**/.gradle/**', '**/.git/**', '**/bootstrap-*.zip'
        }.each { file ->
            def lineNumber = 0
            def inBlockComment = false
            file.eachLine { line ->
                lineNumber++
                def trimmedLine = line.trim()
                
                // Track multi-line comments
                if (trimmedLine.contains('/*') && !trimmedLine.contains('*/')) {
                    inBlockComment = true
                }
                if (inBlockComment && trimmedLine.contains('*/')) {
                    inBlockComment = false
                    return
                }
                
                // Skip package declarations, imports, comments, javadocs, single-line block comments, and default value comments
                if (trimmedLine.startsWith('package ') || 
                    trimmedLine.startsWith('import ') ||
                    trimmedLine.startsWith('//') ||
                    trimmedLine.startsWith('*') ||
                    trimmedLine.contains('package="com.termux.') || // XML package attribute for Java structure
                    line.contains('// Default:') || // Default value comments
                    (trimmedLine.contains('/*') && trimmedLine.contains('*/')) || // Single-line block comment
                    inBlockComment) {
                    return
                }
                
                // Check for hardcoded legacy app id usages that are not class/package references.
                if (line.contains('com.termux') && !line.contains('com.termux.rafacodephi')) {
                    def isManifestTopLevelClassReference =
                        trimmedLine ==~ /.*android:name="com\.termux\.[A-Z][^"]*".*/

                    // Check if it's using a constant or placeholder or is a class reference
                    if (!line.contains('TERMUX_PACKAGE_NAME') && 
                        !line.contains('BuildConfig.APPLICATION_ID') && 
                        !line.contains('${TERMUX_PACKAGE_NAME}') &&
                        !line.contains('TERMUX_PACKAGE_NAME}') &&
                        !isManifestTopLevelClassReference &&
                        !line.contains('com.termux.app.') && // Class reference
                        !line.contains('com.termux.shared.') && // Class reference  
                        !line.contains('com.termux.view.') && // Class reference
                        !line.contains('com.termux.terminal.') && // Class reference
                        !line.contains('com.termux.rafaelia.') && // Class reference
                        !line.contains('from "com.termux"') && // Documentation references
                        !line.contains('changed from "com.termux"')) { // Documentation references
                        errors.add("${file.path}:${lineNumber}: ${trimmedLine}")
                    }
                }
            }
        }
        
        if (!errors.isEmpty()) {
            def errorMsg = "\n❌ Found hardcoded package names (should use TERMUX_PACKAGE_NAME or placeholder):\n"
            errors.each { errorMsg += "  ${it}\n" }
            throw new GradleException(errorMsg)
        } else {
            println "✅ Package name validation passed!"
        }
    }
}

// Validation task to check for legacy storage flags
task validateStorageFlags {
    description = 'Validates that requestLegacyExternalStorage is not used when targeting SDK >= 30'
    group = 'verification'
    
    doLast {
        def targetSdk = android.defaultConfig.targetSdkVersion.apiLevel
        if (targetSdk < 30) {
            println "⚠️  targetSdkVersion is ${targetSdk}, skipping legacy storage check"
            return
        }
        
        def errors = []
        def manifestFiles = fileTree(project.rootProject.projectDir) {
            include '**/AndroidManifest.xml'
            exclude '**/build/**'
        }
        
        manifestFiles.each { file ->
            def lineNumber = 0
            file.eachLine { line ->
                lineNumber++
                if (line.contains('requestLegacyExternalStorage') && line.contains('true')) {
                    errors.add("${file.path}:${lineNumber}: requestLegacyExternalStorage=true found")
                }
            }
        }
        
        if (!errors.isEmpty()) {
            def errorMsg = "\n❌ Found requestLegacyExternalStorage with targetSdk >= 30:\n"
            errors.each { errorMsg += "  ${it}\n" }
            throw new GradleException(errorMsg)
        } else {
            println "✅ Storage flags validation passed!"
        }
    }
}

// Validation task to check authorities use placeholders
task validateAuthorities {
    description = 'Validates that all authorities use ${TERMUX_PACKAGE_NAME} placeholder'
    group = 'verification'
    
    doLast {
        def errors = []
        def manifestFiles = fileTree(project.rootProject.projectDir) {
            include '**/AndroidManifest.xml'
            exclude '**/build/**'
        }
        
        manifestFiles.each { file ->
            def lineNumber = 0
            file.eachLine { line ->
                lineNumber++
                // Check for android:authorities with hardcoded package name
                if (line.contains('android:authorities=') && 
                    line.contains('com.termux') && 
                    !line.contains('${TERMUX_PACKAGE_NAME}')) {
                    errors.add("${file.path}:${lineNumber}: ${line.trim()}")
                }
            }
        }
        
        if (!errors.isEmpty()) {
            def errorMsg = "\n❌ Found authorities without placeholder:\n"
            errors.each { errorMsg += "  ${it}\n" }
            throw new GradleException(errorMsg)
        } else {
            println "✅ Authorities validation passed!"
        }
    }
}

