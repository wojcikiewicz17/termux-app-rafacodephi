# ci_track: ops
# ci_abis: n/a
name: Manual Release Cleanup

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to cleanup (example: v1.2.3)"
        required: true
        type: string
      confirm_cleanup:
        description: "Type DELETE to confirm release/tag cleanup"
        required: true
        type: string

jobs:
  cleanup:
    if: ${{ github.event.inputs.confirm_cleanup == 'DELETE' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate release tag input
        shell: bash
        run: |
          set -euo pipefail
          release_tag='${{ github.event.inputs.release_tag }}'
          if [[ ! "$release_tag" =~ ^v?[0-9]+(\.[0-9]+){2}([\-+].*)?$ ]]; then
            echo "::error::Invalid release tag format: '$release_tag'"
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_ENV"

      - name: Delete GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "$release_tag" --yes --cleanup-tag=false

      - name: Delete tag from remote
        shell: bash
        run: |
          set -euo pipefail
          git init --initial-branch=main .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git push --delete origin "$release_tag"

      - name: Workflow summary
        shell: bash
        run: |
          {
            echo "## Manual release cleanup executed"
            echo
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Deleted release: \`$release_tag\`"
            echo "- Deleted tag: \`$release_tag\`"
          } >> "$GITHUB_STEP_SUMMARY"
