# ci_track: ops
# ci_abis: n/a
name: RafCodePhi Beta Build

on:
  push:
  workflow_dispatch:

jobs:
  beta-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK/NDK
        run: ./scripts/setup_android_toolchain.sh

      - name: Prepare bootstrap hashes (BLAKE3 + SHA256)
        run: ./scripts/prepare_bootstrap_env.sh --github-env

      - name: Build signed + unsigned APK matrix (arm32 + arm64)
        run: ./scripts/build_apk_matrix.sh

      - name: Build bootstrap baremetal guard smoke
        run: |
          cc -O2 -Wall -Wextra -Iapp/src/main/cpp/lowlevel             tools/bootstrap_baremetal_guard_smoke.c             app/src/main/cpp/lowlevel/bootstrap_baremetal_guard.c             -o tools/bootstrap_baremetal_guard_smoke

      - name: Run bootstrap baremetal guard selftest (non-blocking)
        run: |
          set +e
          mkdir -p out
          tools/bootstrap_baremetal_guard_smoke | tee out/bootstrap_baremetal_guard_smoke.txt
          exit 0

      - name: Build PSS3 failure lab tool
        run: |
          cc -O2 -Wall -Wextra -o tools/pss3_failure_lab tools/pss3_failure_lab.c

      - name: Run optional PSS3 failure audit
        run: |
          mkdir -p out
          if [ -f out/failure_trace.csv ]; then
            printf '1\n2\n3\n5\n0\n' | tools/pss3_failure_lab out/failure_trace.csv | tee out/pss3_failure_report.txt
          else
            echo 'failure_trace.csv absent; skipping PSS3 audit' | tee out/pss3_failure_report.txt
          fi

      - name: Enforce BLOCKER_BETA gate only when report exists
        run: |
          if [ -f out/pss3_failure_report.txt ] && grep -q 'BLOCKER_BETA' out/pss3_failure_report.txt; then
            echo 'BLOCKER_BETA detected in PSS3 report';
            exit 1;
          fi

      - name: Publish matrix summary
        run: |
          echo "## APK Matrix Size Report" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_REPORT.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "## Release Signed vs Unsigned Size Diff" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_DIFF_RELEASE.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Upload beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcodephi-beta-artifacts-${{ github.sha }}
          path: |
            dist/apk-matrix/**
            docs/BETA_BUILD_REPORT.md
            docs/BETA_READINESS_REPORT.md
            out/pss3_failure_report.txt
            out/bootstrap_baremetal_guard_smoke.txt
            docs/BETA_BOOTSTRAP_BAREMETAL_GUARD.md
            docs/BETA_BOOTSTRAP_BAREMETAL_STATUS.md
          if-no-files-found: error
