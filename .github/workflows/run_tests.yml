# ci_track: debug
# ci_abis: n/a
name: Unit tests

# =============================================================================
# NOTICE: This workflow is now part of the RAFAELIA unified pipeline.
# Direct triggers are disabled to prevent duplicate builds.
# The main pipeline is: rafaelia_pipeline.yml
# =============================================================================

on:
  # Disabled direct triggers - use rafaelia_pipeline.yml instead
  # push:
  #   branches:
  #     - master
  #     - android-10
  # pull_request:
  #   branches:
  #     - master
  #     - android-10
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual test run'
        required: false
        type: string

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: "📥 Phase 1: Clone repository"
      uses: actions/checkout@v6
    - name: "☕ Phase 2: Setup Java 17"
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: "🤖 Phase 2.1: Setup Android SDK/NDK"
      uses: android-actions/setup-android@v4
    - name: "📦 Phase 2.2: Install Android toolchain components"
      run: |
        ./scripts/ci_android_preflight.sh
    - name: "🧬 Phase 2.3: Validate side-by-side contract"
      run: |
        ./gradlew :app:validateSideBySideContract --no-daemon
    - name: "🧾 Phase 2.4: Prepare bootstrap env for test lane"
      run: |
        ./scripts/prepare_bootstrap_env.sh --github-env
        echo "TERMUX_BOOTSTRAP_VALIDATION_MODE=upstream-debug-compat" >> "$GITHUB_ENV"
    - name: "🧪 Phase 3: Execute unit tests"
      run: |
        echo "=========================================="
        echo "Running unit tests"
        echo "=========================================="
        ./gradlew test
        echo ""
        echo "=========================================="
        echo "TESTS COMPLETED"
        echo "=========================================="
    - name: "🐍 Phase 3.5: Compile Python artifacts (PYC in CI only)"
      run: |
        python3 -m py_compile rmr/Rrr/generated/rafaelia_qpu_simulator.py
        python3 -m py_compile rmr/Rrr/generated/rafaelia_auto_calibration.py
    - name: "🧭 Phase 4: RAFAELIA smoke checks + code inventory"
      run: |
        ./scripts/rafaelia_ci_smoke.sh
    - name: "📦 Phase 5: Upload generated code inventory"
      uses: actions/upload-artifact@v7
      with:
        name: source-code-inventory
        path: INVENTARIO_CODIGO_FONTE.md
