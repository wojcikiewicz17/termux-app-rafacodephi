# ci_track: ops
# ci_abis: n/a
name: Automatic Dependency Submission

# =============================================================================
# This workflow submits dependency graph to GitHub.
# Runs only on workflow_dispatch or scheduled to avoid duplicate runs.
# =============================================================================

on:
  # Only run on manual dispatch or schedule - not on every push
  # push:
  #   branches: [ 'master' ]
  workflow_dispatch:
  schedule:
    # Weekly dependency submission on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@v6
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v6
