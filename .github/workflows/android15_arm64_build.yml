# ci_track: ops
# ci_abis: n/a
# Android 15 ARM64 Build Pipeline
# ISO 8000/9001 Quality Standards Compliant CI/CD Pipeline
#
# This workflow implements first-responder compilation for ARM64 architecture
# targeting Android 15 with 16KB page size compatibility.
#
# Trigger Rules:
#   - Push to master or main branch
#   - Pull requests to master or main branch
#   - Manual dispatch (workflow_dispatch)
#   - Schedule: Daily at 03:00 UTC
#
# Quality Standards:
#   - ISO 8000: Data Quality Management
#   - ISO 9001: Quality Management System
#
# References:
#   - Android 15 Compatibility: ANDROID15_COMPATIBILITY_REPORT.md
#   - 16KB Page Size Fix: ANDROID16_PAGE_SIZE_FIX.md

name: Android 15 ARM64 Build

# =============================================================================
# NOTICE: This workflow is now part of the RAFAELIA unified pipeline.
# Direct triggers are disabled to prevent duplicate builds.
# The main pipeline is: rafaelia_pipeline.yml
# =============================================================================

on:
  # Disabled direct triggers - use rafaelia_pipeline.yml instead
  # push:
  #   branches:
  #     - master
  #     - main
  #     - 'android-15/**'
  #     - 'arm64/**'
  # pull_request:
  #   branches:
  #     - master
  #     - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      run_validation:
        description: 'Run Android 15 Validation'
        required: false
        default: true
        type: boolean
      package_variant:
        description: 'Package Variant'
        required: true
        default: 'apt-android-7'
        type: choice
        options:
          - apt-android-7
          - apt-android-5
  # Disabled schedule - unified pipeline handles scheduling
  # schedule:
  #   # Daily build at 03:00 UTC for continuous integration
  #   - cron: '0 3 * * *'

# Environment variables for quality traceability
env:
  MIN_SDK_VERSION: 21
  JAVA_VERSION: '17'
  # ISO 8000/9001 Quality Identifiers
  QMS_VERSION: '2024.1'
  BUILD_STANDARD: 'ISO-9001-2015'

# Limit permissions for GITHUB_TOKEN to minimum required
permissions:
  contents: read

jobs:
  # Phase 1: Pre-build Validation
  quality-gate:
    name: "🔍 Quality Gate (ISO 9001)"
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_name: ${{ steps.version.outputs.version_name }}
      compile_sdk_version: ${{ steps.android-toolchain.outputs.compile_sdk_version }}
      target_sdk_version: ${{ steps.android-toolchain.outputs.target_sdk_version }}
      ndk_version: ${{ steps.android-toolchain.outputs.ndk_version }}
    
    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "🔍 Quality Check - Validate Commit"
        id: check
        run: |
          echo "=========================================="
          echo "ISO 9001 Quality Gate - Pre-build Check"
          echo "=========================================="
          echo ""
          echo "Build Standard: $BUILD_STANDARD"
          echo "QMS Version: $QMS_VERSION"
          echo ""
          
          # Check if critical files exist
          CRITICAL_FILES=(
            "app/build.gradle"
            "gradle.properties"
            "settings.gradle"
          )
          
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Critical file missing: $file"
              echo "should_build=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "✓ Found: $file"
          done
          
          echo ""
          echo "✅ Quality gate passed"
          echo "should_build=true" >> $GITHUB_OUTPUT

      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Setup Android SDK/NDK"
        uses: android-actions/setup-android@v4

      - name: "📦 Install Android toolchain components"
        run: |
          ./scripts/ci_android_preflight.sh

      - name: "📋 Extract Version Information"
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q :app:printVersionName | tail -n 1)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"

      - name: "📦 Read Android Toolchain Versions (gradle.properties)"
        id: android-toolchain
        run: |
          COMPILE_SDK_VERSION=$(grep -E '^compileSdkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          TARGET_SDK_VERSION=$(grep -E '^targetSdkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          NDK_VERSION=$(grep -E '^ndkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')

          if [ -z "$COMPILE_SDK_VERSION" ] || [ -z "$TARGET_SDK_VERSION" ] || [ -z "$NDK_VERSION" ]; then
            echo "❌ Missing compileSdkVersion/targetSdkVersion/ndkVersion in gradle.properties"
            exit 1
          fi

          echo "compile_sdk_version=$COMPILE_SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_sdk_version=$TARGET_SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "ndk_version=$NDK_VERSION" >> "$GITHUB_OUTPUT"

          echo "Source of truth: gradle.properties"
          echo "compileSdkVersion=$COMPILE_SDK_VERSION"
          echo "targetSdkVersion=$TARGET_SDK_VERSION"
          echo "ndkVersion=$NDK_VERSION"

  # Phase 2: ARM64 Android 15 Build
  build-arm64:
    name: "🔨 Build ARM64 (Android 15)"
    needs: quality-gate
    if: needs.quality-gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]
    
    env:
      PACKAGE_VARIANT: ${{ matrix.package_variant }}
      COMPILE_SDK_VERSION: ${{ needs.quality-gate.outputs.compile_sdk_version }}
      TARGET_SDK_VERSION: ${{ needs.quality-gate.outputs.target_sdk_version }}
      NDK_VERSION: ${{ needs.quality-gate.outputs.ndk_version }}

    steps:
      - name: "📥 Phase 1: Clone Repository"
        uses: actions/checkout@v6

      - name: "☕ Phase 2: Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Phase 2.1: Setup Android SDK/NDK"
        uses: android-actions/setup-android@v4

      - name: "📦 Phase 2.2: Install Android toolchain components"
        run: |
          ./scripts/ci_android_preflight.sh

      - name: "🔐 Phase 2.3: Configure optional release signing"
        env:
          INPUT_BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./scripts/setup_android_signing.sh

      - name: "🔧 Phase 3: Configure Build Environment"
        run: |
          echo "=========================================="
          echo "Build Configuration"
          echo "=========================================="
          echo ""
          echo "Target Architecture: arm64-v8a (ARM64)"
          echo "Compile SDK: $COMPILE_SDK_VERSION (from gradle.properties)"
          echo "Target SDK: $TARGET_SDK_VERSION (from gradle.properties)"
          echo "NDK Version: $NDK_VERSION"
          echo "Package Variant: $PACKAGE_VARIANT"
          echo "16KB Page Alignment: ENABLED"
          echo ""
          
          # Verify 16KB page size flags in build.gradle
          if grep -q "max-page-size=16384" app/build.gradle; then
            echo "✓ 16KB page alignment flag found"
          else
            echo "⚠ Warning: 16KB page alignment flag may be missing"
          fi

      - name: "🔨 Phase 4: Build ARM64 APK"
        id: build
        shell: bash {0}
        run: |
          exit_on_error() { echo "$1"; exit 1; }
          
          echo "=========================================="
          echo "Building ARM64 APK for Android 15"
          echo "=========================================="
          echo ""
          
          # Set version for build
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            GITHUB_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          
          CURRENT_VERSION_NAME="${{ needs.quality-gate.outputs.version_name }}"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}"
          
          # Determine build type for path (debug or release)
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          APK_DIR_PATH="./app/build/outputs/apk/$BUILD_TYPE"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-$PACKAGE_VARIANT-arm64-android15"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"
          
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV
          
          echo "Version: ${RELEASE_VERSION_NAME/v/}"
          echo "APK Tag: $APK_VERSION_TAG"
          echo ""
          
          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          
          # Determine build type (from workflow_dispatch input or default to debug)
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          GRADLE_TASK="assemble${BUILD_TYPE^}" # Capitalize first letter: assembleDebug or assembleRelease
          if [[ "$BUILD_TYPE" == "debug" ]]; then
            export TERMUX_BOOTSTRAP_VALIDATION_MODE="upstream-debug-compat"
          fi
          
          echo "Build Type: $BUILD_TYPE"
          echo "Gradle Task: $GRADLE_TASK"
          echo ""
          
          # Materialize required bootstrap archives deterministically before assemble.
          if ! ./gradlew :app:downloadBootstraps \
              --no-daemon \
              --warning-mode all; then
            exit_on_error "❌ Bootstrap download/prep failed for ARM64 Android 15"
          fi

          # Build with focus on arm64
          if ! ./gradlew $GRADLE_TASK \
              -Pandroid.injected.build.abi=arm64-v8a \
              --no-daemon \
              --warning-mode all; then
            exit_on_error "❌ Build failed for ARM64 Android 15"
          fi
          
          echo ""
          echo "✅ Build completed successfully"

      - name: "✅ Phase 5: Validate Build Output"
        run: |
          echo "=========================================="
          echo "Validating ARM64 APK"
          echo "=========================================="
          echo ""
          
          # Check for ARM64 APK
          if ls $APK_DIR_PATH/*arm64*.apk 1> /dev/null 2>&1; then
            echo "✓ ARM64 APK found"
            ls -la $APK_DIR_PATH/*arm64*.apk
          elif ls $APK_DIR_PATH/*universal*.apk 1> /dev/null 2>&1; then
            echo "✓ Universal APK found (includes ARM64)"
            ls -la $APK_DIR_PATH/*universal*.apk
          else
            echo "Available APKs:"
            ls -la $APK_DIR_PATH/*.apk 2>/dev/null || echo "No APKs found"
          fi
          
          echo ""
          echo "=========================================="
          echo "Build Artifacts"
          echo "=========================================="
          ls -la $APK_DIR_PATH/ 2>/dev/null || echo "Build directory not found"

      - name: "📦 Phase 6: Upload ARM64 APK Artifact"
        uses: actions/upload-artifact@v7
        with:
          name: termux-rafacodephi-arm64-android15-${{ env.APK_VERSION_TAG }}
          path: |
            ${{ env.APK_DIR_PATH }}/*.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          retention-days: 30

  # Phase 3: Android 15 Validation
  validate-android15:
    name: "🔍 Android 15 Validation"
    needs: build-arm64
    if: |
      always() && 
      needs.build-arm64.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_validation == 'true')
    runs-on: ubuntu-latest
    
    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Setup Android SDK/NDK"
        uses: android-actions/setup-android@v4

      - name: "📦 Install Android toolchain components"
        run: |
          ./scripts/ci_android_preflight.sh

      - name: "🔍 Run Android 15 Compatibility Validation"
        run: |
          echo "=========================================="
          echo "Android 15 Compatibility Validation"
          echo "=========================================="
          echo ""
          
          echo "Running blocking validation tasks..."
          ./gradlew validateAndroid15Compatibility --no-daemon
          echo "✓ Validation passed successfully"
          
          echo ""
          echo "=========================================="
          echo "Validation Complete"
          echo "=========================================="

  # Phase 4: Quality Report
  quality-report:
    name: "📊 Quality Report (ISO 8000)"
    needs: [quality-gate, build-arm64, validate-android15]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: "📊 Generate Quality Report"
        run: |
          echo "=========================================="
          echo "ISO 8000/9001 Quality Report"
          echo "=========================================="
          echo ""
          echo "Build Pipeline: Android 15 ARM64"
          echo "Quality Standard: $BUILD_STANDARD"
          echo "QMS Version: $QMS_VERSION"
          echo ""
          echo "Pipeline Results:"
          echo "  - Quality Gate: ${{ needs.quality-gate.result }}"
          echo "  - Build ARM64: ${{ needs.build-arm64.result }}"
          echo "  - Validation: ${{ needs.validate-android15.result }}"
          echo ""
          
          if [ "${{ needs.build-arm64.result }}" == "success" ]; then
            echo "✅ Pipeline completed successfully"
            echo ""
            echo "Quality Metrics:"
            echo "  - Build Reproducibility: PASS"
            echo "  - Architecture Target: arm64-v8a"
            echo "  - Android SDK/NDK (gradle.properties): compileSdk ${{ needs.quality-gate.outputs.compile_sdk_version }}, targetSdk ${{ needs.quality-gate.outputs.target_sdk_version }}, ndk ${{ needs.quality-gate.outputs.ndk_version }}"
            echo "  - 16KB Page Support: ENABLED"
          else
            echo "❌ Pipeline completed with failures"
            echo ""
            echo "Review the failed jobs above for details."
          fi
          
          echo ""
          echo "=========================================="
          echo "Report Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "=========================================="
