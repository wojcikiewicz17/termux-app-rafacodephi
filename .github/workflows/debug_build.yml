# ci_track: ops
# ci_abis: n/a
name: Build

# =============================================================================
# NOTICE: This workflow is now part of the RAFAELIA unified pipeline.
# Direct triggers are disabled to prevent duplicate builds.
# The main pipeline is: rafaelia_pipeline.yml
# =============================================================================

on:
  # Disabled direct triggers - use rafaelia_pipeline.yml instead
  # push:
  #   branches:
  #     - master
  #     - 'github-releases/**'
  # pull_request:
  #   branches:
  #     - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: "📥 Phase 1: Clone repository"
        uses: actions/checkout@v6

      - name: "☕ Phase 2: Setup Java 17"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: "🤖 Phase 2.1: Setup Android SDK/NDK"
        uses: android-actions/setup-android@v4
      - name: "📦 Phase 2.2: Install Android toolchain components"
        run: |
          ./scripts/ci_android_preflight.sh

      - name: "🔨 Phase 3: Build APKs"
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          echo "=========================================="
          echo "PHASE 1: Setting build variables"
          echo "=========================================="
          echo "Setting vars"

          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
              GITHUB_SHA="${{ github.event.pull_request.head.sha }}" # Do not use last merge commit set in GITHUB_SHA
          fi

          # Set RELEASE_VERSION_NAME to "<CURRENT_VERSION_NAME>+<last_commit_hash>"
          CURRENT_VERSION_NAME="$(./gradlew -q :app:printVersionName | tail -n 1)"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}" # The "+" is necessary so that versioning precedence is not affected
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
           exit_on_error "The versionName '${RELEASE_VERSION_NAME/v/}' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html."
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-${PACKAGE_VARIANT}-github-debug" # Note the "-", GITHUB_SHA will already have "+" before it
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          # Used by attachment steps later
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV

          echo ""
          echo "=========================================="
          echo "PHASE 2: Building APKs"
          echo "=========================================="
          echo "Building APKs for 'APK_VERSION_TAG' build"
          echo "Package variant: ${PACKAGE_VARIANT}"
          echo "Version: ${RELEASE_VERSION_NAME/v/}"
          echo ""
          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}" # Used by app/build.gradle
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG" # Used by app/build.gradle
          export TERMUX_PACKAGE_VARIANT="${PACKAGE_VARIANT}" # Used by app/build.gradle
          export TERMUX_BOOTSTRAP_VALIDATION_MODE="upstream-debug-compat" # Debug-only compatibility rail.
          
          echo "Starting Gradle build process..."
          if ! ./gradlew assembleDebug; then
            exit_on_error "Build failed for '$APK_VERSION_TAG' build."
          fi
          
          echo ""
          echo "=========================================="
          echo "PHASE 3: Validating APKs"
          echo "=========================================="
          fail_with_output_listing() {
            local error_message="$1"
            local files_found
            files_found="$(ls -1 "$APK_DIR_PATH")"
            exit_on_error "$error_message"$'\n'"Files found:"$'\n'"$files_found"
          }

          echo "Validating APKs based on generated outputs"
          mapfile -t generated_apks < <(find "$APK_DIR_PATH" -maxdepth 1 -type f -name "${APK_BASENAME_PREFIX}_*.apk" -printf '%f\n' | sort)
          if [ ${#generated_apks[@]} -eq 0 ]; then
            fail_with_output_listing "No APKs were generated in '$APK_DIR_PATH'."
          fi

          mapfile -t generated_abis < <(printf '%s\n' "${generated_apks[@]}" | sed -E "s/^${APK_BASENAME_PREFIX}_(.+)\.apk$/\1/" | sort -u)
          echo "Generated ABIs: ${generated_abis[*]}"

          declare -A generated_abi_set=()
          for abi in "${generated_abis[@]}"; do
            generated_abi_set["$abi"]=1
          done
          abi_generated() {
            local abi="$1"
            [[ -n "${generated_abi_set[$abi]:-}" ]]
          }

          mandatory_abis=(arm64-v8a armeabi-v7a x86_64)
          if abi_generated universal; then
            mandatory_abis+=(universal)
          fi

          for abi in "${mandatory_abis[@]}"; do
            if ! abi_generated "$abi"; then
              fail_with_output_listing "Mandatory ABI '$abi' was not generated."
            fi
            echo "✓ Mandatory APK present: ${APK_BASENAME_PREFIX}_$abi.apk"
          done

          if abi_generated x86; then
            echo "ℹ Optional ABI x86 detected and accepted."
          else
            echo "ℹ Optional ABI x86 not generated by current toolchain/AGP; continuing."
          fi

          echo ""
          echo "=========================================="
          echo "PHASE 4: Generating checksums"
          echo "=========================================="
          echo "Generating sha256sums file from generated APKs"
          if ! (cd "$APK_DIR_PATH"; sha256sum "${generated_apks[@]}" > "${APK_BASENAME_PREFIX}_sha256sums"); then
            exit_on_error "Generate sha256sums failed for '$APK_VERSION_TAG' release."
          fi
          
          echo ""
          echo "=========================================="
          echo "BUILD COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "All APKs built and validated for: $APK_VERSION_TAG"
          echo ""

      - name: "📦 Phase 4.1: Upload universal APK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_universal
          if-no-files-found: ignore
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_universal.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Phase 4.2: Upload arm64-v8a APK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_arm64-v8a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Phase 4.3: Upload armeabi-v7a APK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Phase 4.4: Upload x86_64 APK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86_64
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86_64.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Phase 4.5: Upload x86 APK artifact (optional)"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86
          if-no-files-found: ignore
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Phase 4.6: Upload sha256sums artifact"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_sha256sums
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_sha256sums
            ${{ env.APK_DIR_PATH }}/output-metadata.json
