name: APK Matrix Build (signed + unsigned)

on:
  workflow_dispatch:
    inputs:
      upload_unsigned_debug_arm64:
        description: Upload unsigned debug arm64-v8a APK
        type: boolean
        default: true
      upload_unsigned_debug_arm32:
        description: Upload unsigned debug armeabi-v7a APK
        type: boolean
        default: true
      upload_unsigned_debug_universal:
        description: Upload unsigned debug universal APK
        type: boolean
        default: true
      upload_unsigned_release_arm64:
        description: Upload unsigned release arm64-v8a APK
        type: boolean
        default: true
      upload_unsigned_release_arm32:
        description: Upload unsigned release armeabi-v7a APK
        type: boolean
        default: true
      upload_unsigned_release_universal:
        description: Upload unsigned release universal APK
        type: boolean
        default: true
      upload_signed_release_arm64:
        description: Upload signed release arm64-v8a APK
        type: boolean
        default: true
      upload_signed_release_arm32:
        description: Upload signed release armeabi-v7a APK
        type: boolean
        default: true
      upload_signed_release_universal:
        description: Upload signed release universal APK
        type: boolean
        default: true
      upload_report_apk_size:
        description: Upload APK size report
        type: boolean
        default: true
      upload_report_size_diff:
        description: Upload release size diff report
        type: boolean
        default: true
      upload_report_sha256:
        description: Upload SHA256 checksums report
        type: boolean
        default: true
      upload_report_manifest:
        description: Upload artifact manifest report
        type: boolean
        default: true
      upload_local_keystore:
        description: Upload generated local signing keystore
        type: boolean
        default: false
      use_official_signing:
        description: Use OFFICIAL_* signing secrets (fallbacks to local validation key if unavailable)
        type: boolean
        default: false

jobs:
  build-apk-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK/NDK
        run: ./scripts/setup_android_toolchain.sh

      - name: Validate lowlevel bootstrap spec sync
        run: ./scripts/bootstrap_lowlevel_sync_check.sh

      - name: Prepare optional official signing keystore
        if: ${{ inputs.use_official_signing }}
        env:
          OFFICIAL_RELEASE_KEYSTORE_B64: ${{ secrets.OFFICIAL_RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "${OFFICIAL_RELEASE_KEYSTORE_B64}" ]; then
            echo "OFFICIAL_RELEASE_KEYSTORE_B64 not configured; using local validation keystore."
            exit 0
          fi
          mkdir -p dist
          echo "${OFFICIAL_RELEASE_KEYSTORE_B64}" | base64 --decode > dist/official-release.keystore
          echo "OFFICIAL_KEYSTORE_READY=1" >> "$GITHUB_ENV"

      - name: Build signed + unsigned APK matrix
        env:
          KEYSTORE_PATH: ${{ env.OFFICIAL_KEYSTORE_READY == '1' && 'dist/official-release.keystore' || '' }}
          KEY_ALIAS: ${{ env.OFFICIAL_KEYSTORE_READY == '1' && secrets.OFFICIAL_RELEASE_KEY_ALIAS || '' }}
          STORE_PASS: ${{ env.OFFICIAL_KEYSTORE_READY == '1' && secrets.OFFICIAL_RELEASE_STORE_PASSWORD || '' }}
          KEY_PASS: ${{ env.OFFICIAL_KEYSTORE_READY == '1' && secrets.OFFICIAL_RELEASE_KEY_PASSWORD || '' }}
        run: ./scripts/build_apk_matrix.sh

      - name: Publish APK size report in workflow summary
        run: |
          echo "## APK Matrix Size Report" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_REPORT.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "## Release Signed vs Unsigned Size Diff" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_DIFF_RELEASE.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Upload unsigned debug arm64 APK
        if: ${{ inputs.upload_unsigned_debug_arm64 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-debug-arm64-v8a-${{ github.sha }}
          path: dist/apk-matrix/unsigned/*debug*arm64-v8a*.apk
          if-no-files-found: error

      - name: Upload unsigned debug arm32 APK
        if: ${{ inputs.upload_unsigned_debug_arm32 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-debug-armeabi-v7a-${{ github.sha }}
          path: dist/apk-matrix/unsigned/*debug*armeabi-v7a*.apk
          if-no-files-found: error

      - name: Upload unsigned debug universal APK
        if: ${{ inputs.upload_unsigned_debug_universal }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-debug-universal-${{ github.sha }}
          path: |
            dist/apk-matrix/unsigned/*debug*.apk
            !dist/apk-matrix/unsigned/*debug*arm64-v8a*.apk
            !dist/apk-matrix/unsigned/*debug*armeabi-v7a*.apk
          if-no-files-found: error

      - name: Upload unsigned release arm64 APK
        if: ${{ inputs.upload_unsigned_release_arm64 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-release-arm64-v8a-${{ github.sha }}
          path: dist/apk-matrix/unsigned/*release*arm64-v8a*.apk
          if-no-files-found: error

      - name: Upload unsigned release arm32 APK
        if: ${{ inputs.upload_unsigned_release_arm32 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-release-armeabi-v7a-${{ github.sha }}
          path: dist/apk-matrix/unsigned/*release*armeabi-v7a*.apk
          if-no-files-found: error

      - name: Upload unsigned release universal APK
        if: ${{ inputs.upload_unsigned_release_universal }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-unsigned-release-universal-${{ github.sha }}
          path: |
            dist/apk-matrix/unsigned/*release*.apk
            !dist/apk-matrix/unsigned/*release*arm64-v8a*.apk
            !dist/apk-matrix/unsigned/*release*armeabi-v7a*.apk
          if-no-files-found: error

      - name: Upload signed release arm64 APK
        if: ${{ inputs.upload_signed_release_arm64 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-signed-release-arm64-v8a-${{ github.sha }}
          path: dist/apk-matrix/signed/*release*arm64-v8a*-signed.apk
          if-no-files-found: error

      - name: Upload signed release arm32 APK
        if: ${{ inputs.upload_signed_release_arm32 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-signed-release-armeabi-v7a-${{ github.sha }}
          path: dist/apk-matrix/signed/*release*armeabi-v7a*-signed.apk
          if-no-files-found: error

      - name: Upload signed release universal APK
        if: ${{ inputs.upload_signed_release_universal }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-signed-release-universal-${{ github.sha }}
          path: |
            dist/apk-matrix/signed/*release*-signed.apk
            !dist/apk-matrix/signed/*release*arm64-v8a*-signed.apk
            !dist/apk-matrix/signed/*release*armeabi-v7a*-signed.apk
          if-no-files-found: error

      - name: Upload APK size report
        if: ${{ inputs.upload_report_apk_size }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-report-apk-size-${{ github.sha }}
          path: dist/apk-matrix/APK_SIZE_REPORT.tsv
          if-no-files-found: error

      - name: Upload release size diff report
        if: ${{ inputs.upload_report_size_diff }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-report-apk-size-diff-${{ github.sha }}
          path: dist/apk-matrix/APK_SIZE_DIFF_RELEASE.tsv
          if-no-files-found: error

      - name: Upload SHA256 checksums
        if: ${{ inputs.upload_report_sha256 }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-report-sha256sums-${{ github.sha }}
          path: dist/apk-matrix/SHA256SUMS.txt
          if-no-files-found: error

      - name: Upload artifact manifest
        if: ${{ inputs.upload_report_manifest }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-report-artifact-manifest-${{ github.sha }}
          path: dist/apk-matrix/ARTIFACT_MANIFEST.txt
          if-no-files-found: error

      - name: Upload local signing keystore
        if: ${{ inputs.upload_local_keystore }}
        uses: actions/upload-artifact@v4
        with:
          name: termux-apk-matrix-local-keystore-${{ github.sha }}
          path: dist/local-release.keystore
          if-no-files-found: error
