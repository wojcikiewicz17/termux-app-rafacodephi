# ci_track: ops
# ci_abis: n/a
name: audit-benchmark-contract
on:
  push:
  pull_request:

jobs:
  audit-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: ./scripts/validate_audit_claims.sh
      - run: ./scripts/collect_vectra_grade_benchmarks.sh
      - run: ./scripts/rmr_equivalence_check.sh
      - uses: actions/upload-artifact@v4
        with:
          name: audit-benchmark-reports
          path: reports/*
