# ci_track: ops
# ci_abis: n/a
name: Attach Debug APKs To Release

on:
  workflow_call:
    inputs:
      release_ref:
        description: Git ref for the release tag (e.g. refs/tags/v1.2.3)
        required: true
        type: string

jobs:
  attach-apks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_REF: ${{ inputs.release_ref }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v4

      - name: Install Android toolchain components
        run: |
          ./scripts/ci_android_preflight.sh

      - name: Build and attach APKs to release
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          set -euo pipefail

          preflight_release_cli() {
            if command -v gh >/dev/null 2>&1; then
              RELEASE_CLI="gh"
            else
              echo "Neither 'gh' nor a fallback release CLI is available in PATH."
              return 1
            fi

            if ! gh auth status >/dev/null 2>&1; then
              echo "GitHub CLI authentication failed. Ensure GITHUB_TOKEN/GH_TOKEN is available."
              return 1
            fi

            echo "Release CLI preflight OK: $RELEASE_CLI"
          }

          exit_on_error() {
              local message="$1"
              echo "::error::$message"
              {
                echo "## attach_debug_apks_to_release failed"
                echo
                echo "- Release: \`$RELEASE_VERSION_NAME\`"
                echo "- Tag ref: \`$GITHUB_REF\`"
                echo "- Package variant: \`${PACKAGE_VARIANT}\`"
                echo "- Error: $message"
                echo
                echo "> No automatic release/tag deletion was performed."
                echo "> If cleanup is required, run a dedicated manual cleanup workflow/job."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
          }

          echo "Running release CLI preflight"
          if ! preflight_release_cli; then
            exit_on_error "Release CLI preflight failed."
          fi

          echo "Setting vars"
          RELEASE_VERSION_NAME="${RELEASE_REF/refs\/tags\//}"
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
            exit_on_error "The versionName '${RELEASE_VERSION_NAME/v/}' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html."
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME+${PACKAGE_VARIANT}-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          echo "Building APKs for '$APK_VERSION_TAG' release"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG" # Used by app/build.gradle
          export TERMUX_PACKAGE_VARIANT="${PACKAGE_VARIANT}" # Used by app/build.gradle
          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}" # Used by app/build.gradle
          export TERMUX_BOOTSTRAP_VALIDATION_MODE="upstream-debug-compat" # Debug-only compatibility rail.
          echo "Effective versioning: tag=$TERMUX_APK_VERSION_TAG versionName=$TERMUX_APP_VERSION_NAME"
          echo "Release tag used (RELEASE_VERSION_NAME): $RELEASE_VERSION_NAME"
          if ! ./gradlew assembleDebug; then
            exit_on_error "Build failed for '$APK_VERSION_TAG' release."
          fi
          if ! BUILT_VERSION_NAME="$(./gradlew -q :app:printVersionName)"; then
            exit_on_error "Failed to resolve built versionName via :app:printVersionName for '$APK_VERSION_TAG'."
          fi
          if [[ "$BUILT_VERSION_NAME" != "$TERMUX_APP_VERSION_NAME" ]]; then
            exit_on_error "versionName mismatch. Expected '$TERMUX_APP_VERSION_NAME' but got '$BUILT_VERSION_NAME'."
          fi

          required_abis=(universal arm64-v8a armeabi-v7a x86_64)
          optional_abis=(x86)
          checksum_inputs=()
          upload_assets=()

          echo "Validating required APKs"
          for abi in "${required_abis[@]}"; do
            apk_path="$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk"
            if ! test -f "$apk_path"; then
              files_found="$(ls "$APK_DIR_PATH")"
              exit_on_error "Failed to find built APK at '$apk_path'. Files found: ${files_found}"
            fi
            checksum_inputs+=("${APK_BASENAME_PREFIX}_$abi.apk")
            upload_assets+=("$apk_path")
          done

          echo "Optional ABIs for validation: ${optional_abis[*]}"
          for abi in "${optional_abis[@]}"; do
            apk_path="$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk"
            if test -f "$apk_path"; then
              echo "optional ABI '$abi' present: '$apk_path' (will be included in checksum/upload)."
              checksum_inputs+=("${APK_BASENAME_PREFIX}_$abi.apk")
              upload_assets+=("$apk_path")
            else
              echo "optional ABI '$abi' absent: '$apk_path' (continuing without it)."
            fi
          done

          echo "Generating sha256sums file"
          if ! (
            cd "$APK_DIR_PATH"
            sha256sum "${checksum_inputs[@]}" > "${APK_BASENAME_PREFIX}_sha256sums"
          ); then
            exit_on_error "Generate sha256sums failed for '$APK_VERSION_TAG' release."
          fi

          echo "Attaching APKs to github release"
          upload_assets+=("$APK_DIR_PATH/${APK_BASENAME_PREFIX}_sha256sums")
          echo "Release upload assets:"
          printf ' - %s\n' "${upload_assets[@]}"

          if ! gh release upload "$RELEASE_VERSION_NAME" "${upload_assets[@]}" --clobber; then
            exit_on_error "Attach APKs to release failed for '$APK_VERSION_TAG' release."
          fi
