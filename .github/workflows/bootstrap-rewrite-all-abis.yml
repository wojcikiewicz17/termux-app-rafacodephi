# ci_track: ops
# ci_abis: n/a
name: bootstrap-rewrite-all-abis
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/rewrite_bootstrap.py'
      - 'app/build.gradle'
      - '.github/workflows/bootstrap-rewrite-all-abis.yml'
jobs:
  rewrite-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: ./gradlew :app:rewriteBootstraps :app:validateRewrittenBootstraps
      - run: |
          cp app/src/main/cpp/rewritten-bootstrap-arm.zip rewritten-bootstrap-arm.zip
          cp app/src/main/cpp/rewritten-bootstrap-aarch64.zip rewritten-bootstrap-aarch64.zip
          cat build/reports/bootstrap-rewrite/bootstrap-elf-report.txt build/reports/bootstrap-rewrite/bootstrap-text-rewrite-report.txt > bootstrap-rewrite-report-all.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-rewrite-all
          path: |
            rewritten-bootstrap-arm.zip
            rewritten-bootstrap-aarch64.zip
            bootstrap-rewrite-report-all.txt
            build/reports/bootstrap-rewrite/bootstrap-elf-report.txt
            build/reports/bootstrap-rewrite/bootstrap-text-rewrite-report.txt
